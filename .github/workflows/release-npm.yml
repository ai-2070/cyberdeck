name: Release NPM

# Publishes the napi binding `@ai2070/net` to npm. The
# pure-TypeScript SDK `@ai2070/net-sdk` ships via
# `release-npm-sdk.yml`.
#
# Tag schema: `node-v<semver>` (e.g. `node-v0.8.0`).
#
# Required repository secret: `NPM_TOKEN`
#   `Automation` token type so 2FA doesn't block CI publishes.

on:
  push:
    tags:
      - "node-v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: net/crates/net/bindings/node

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # `crates/net/rust-toolchain.toml` pins the cargo invocation
      # to 1.95.0 with profile=minimal. The `dtolnay/rust-toolchain`
      # step above installed stable + this target on stable, but
      # cargo auto-switches to 1.95.0 once it enters `crates/net/`
      # and that pinned toolchain doesn't carry the cross-compile
      # target — `rustc` then errors with "can't find crate for
      # core". Adding the target inside the pinned-toolchain dir
      # forwards rustup's target-add to the pinned channel.
      - name: Add target to pinned toolchain
        working-directory: net/crates/net
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (aarch64-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # `cc-rs` (used by `ring` and other native deps) needs a real
      # `<arch>-linux-musl-gcc` binary on PATH for musl cross-builds.
      # Ubuntu doesn't ship one, and `--use-napi-cross` from napi-rs's
      # CLI didn't pull a Docker image in this environment. musl.cc
      # ships static prebuilt cross-toolchains; we untar one, prepend
      # its bin/ to PATH, and pin cargo's linker env so the wire-up
      # is explicit.
      - name: Install musl cross compiler
        if: contains(matrix.target, 'musl')
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              NAME="x86_64-linux-musl-cross"
              echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-linux-musl-gcc" >> "$GITHUB_ENV"
              ;;
            aarch64-unknown-linux-musl)
              NAME="aarch64-linux-musl-cross"
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unexpected musl target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac
          wget -q "https://musl.cc/${NAME}.tgz" -O /tmp/musl-cross.tgz
          tar -xf /tmp/musl-cross.tgz -C "$HOME"
          echo "$HOME/${NAME}/bin" >> "$GITHUB_PATH"

      - name: Install npm dependencies
        run: npm i

      - name: Build native module
        # `--features` is baked into the `build` script in
        # package.json (redis,net,cortex,compute,groups). Don't pass
        # it again here — `@napi-rs/cli` 3.x forwards the second
        # `--features <name>` to cargo as a positional, and cargo
        # rejects it with "unexpected argument 'name' found".
        run: npm run build -- --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: net/crates/net/bindings/node/*.node
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net/bindings/node

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm i

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: net/crates/net/bindings/node/artifacts

      - name: Move artifacts
        run: npm run artifacts

      - name: List packages
        run: ls -la npm/

      - name: Publish to npm
        run: |
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
