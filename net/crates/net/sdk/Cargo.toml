[package]
name = "net-sdk"
version = "0.1.0"
edition = "2021"
description = "Ergonomic Rust SDK for the Net mesh network"
license = "Apache-2.0"

[dependencies]
net = { path = "..", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = "1"
futures = "0.3"
tokio = { version = "1", features = ["rt", "time", "sync"] }
pin-project-lite = "0.2"
thiserror = "2"

[features]
default = []
redis = ["net/redis"]
jetstream = ["net/jetstream"]
net = ["net/net"]
full = ["redis", "jetstream", "net"]
