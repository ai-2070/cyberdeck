[package]
name = "net-sdk"
version = "0.1.0"
edition = "2021"
description = "Ergonomic Rust SDK for the Net mesh network"
license = "Apache-2.0"

[dependencies]
net = { path = "..", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = "1"
futures = "0.3"
tokio = { version = "1", features = ["rt", "time", "sync"] }
pin-project-lite = "0.2"
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }

[features]
default = []
redis = ["net/redis"]
jetstream = ["net/jetstream"]
net = ["net/net"]
# CortEX adds the typed event-sourced adapters (tasks + memories) plus
# the NetDb facade. `redex-disk` comes along so `.persistent(true)` is
# usable from the SDK without a separate feature flip.
cortex = ["net/netdb", "net/redex-disk"]
# Security surface — identity (keypairs + tokens), capability
# declarations, and subnet assignment. All three sit on top of the
# `net` feature because the underlying types live in `adapter::net`;
# there's no finer-grained gate to reach for.
identity = ["net/net"]
capabilities = ["net/net"]
subnets = ["net/net"]
# Common-case bundle: enable the whole security surface at once.
security = ["identity", "capabilities", "subnets"]
full = ["redis", "jetstream", "net", "cortex", "security"]
