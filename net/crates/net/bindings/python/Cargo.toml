[package]
name = "blackstream-python"
version = "0.5.0"
edition = "2021"
license = "Apache-2.0"
description = "Python bindings for Blackstream event bus"

[lib]
name = "_blackstream"
crate-type = ["cdylib"]

[features]
default = ["redis", "bltp"]
redis = ["blackstream/redis"]
jetstream = ["blackstream/jetstream"]
bltp = ["blackstream/bltp", "dep:hex"]

[dependencies]
blackstream = { path = "../..", default-features = false }
pyo3 = { version = "0.28.0", features = ["extension-module"] }
tokio = { version = "1.48.0", features = ["rt-multi-thread"] }
serde_json = "1.0.145"
bytes = "1.11.0"
hex = { version = "0.4", optional = true }

[build-dependencies]
pyo3-build-config = "0.28.0"

[profile.release]
lto = true
